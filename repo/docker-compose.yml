version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance_secret
      POSTGRES_DB: compliance_console
    volumes:
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./backend/db/governance_schema.sql:/docker-entrypoint-initdb.d/02_governance.sql
      - ./backend/db/reconciliation_schema.sql:/docker-entrypoint-initdb.d/03_reconciliation.sql
      - ./backend/db/security_schema.sql:/docker-entrypoint-initdb.d/04_security.sql
      - ./backend/db/05_migration.sql:/docker-entrypoint-initdb.d/05_migration.sql
      - ./backend/db/06_enhancements.sql:/docker-entrypoint-initdb.d/06_enhancements.sql
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance -d compliance_console"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - compliance-net

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: compliance
      DB_PASSWORD: compliance_secret
      DB_NAME: compliance_console
    expose:
      - "8080"
    networks:
      - compliance-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - compliance-net
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "3443:3443"
      - "3080:3080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_certs:/config
    networks:
      - compliance-net
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_certs:

networks:
  compliance-net:
    driver: bridge
